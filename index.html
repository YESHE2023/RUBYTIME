<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Día de la Enfermera</title>
    <style>
        :root {
            --pink-light: #fff0f3;
            --pink-medium: #ff8fa3;
            --pink-dark: #ff4d6d;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #ffb3c1, #ff8fa3);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animación de fondo: partículas */
        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            bottom: -50px;
            animation: float 10s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }

        /* Tarjeta principal */
        .card {
            background: var(--white);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            text-align: center;
            width: 350px;
            z-index: 10;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 1s ease-out forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .icon {
            font-size: 3rem;
            color: var(--pink-dark);
            margin-bottom: 1.5rem;
            display: inline-block;
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        h1 {
            color: var(--pink-dark);
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }

        p {
            color: #444;
            font-size: 1.1rem;
            line-height: 1.5;
            margin-bottom: 1.5rem;
        }

        .signature {
            font-weight: bold;
            color: var(--pink-medium);
            border-top: 1px solid var(--pink-light);
            padding-top: 1rem;
        }
    </style>
</head>
<body>

    <!-- Generación de partículas de fondo -->
    <div class="particle" style="width: 20px; height: 20px; left: 10%; animation-duration: 8s;"></div>
    <div class="particle" style="width: 40px; height: 40px; left: 30%; animation-duration: 12s; animation-delay: 2s;"></div>
    <div class="particle" style="width: 15px; height: 15px; left: 70%; animation-duration: 10s; animation-delay: 4s;"></div>
    <div class="particle" style="width: 30px; height: 30px; left: 85%; animation-duration: 15s; animation-delay: 1s;"></div>
    <div class="particle" style="width: 25px; height: 25px; left: 50%; animation-duration: 9s; animation-delay: 5s;"></div>

    <div class="card">
        <div class="icon">♥</div>
        <h1>¡Feliz Día!</h1>
        <p>
            Aunque ya no estemos juntos, debes saber que reconozco tu gran vocación y compromiso como futura enfermera. <br><br>
            Te estimo mucho y siempre te deseo lo mejor.
        </p>
        <div class="signature">Con aprecio HERSCHEL</div>
    </div>

</body>
</html>
